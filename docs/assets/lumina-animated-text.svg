<svg width="960" height="180" viewBox="0 0 960 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lumina animated wordmark</title>
  <desc id="desc">Animated text reading Lumina with the tagline Architecting Legacies.</desc>
  <style>
    .bg { fill: #050505; }
    .word {
      font: 700 78px Georgia, "Times New Roman", serif;
      letter-spacing: 18px;
      fill: url(#gold);
      stroke: #f2ca50;
      stroke-width: 0.8;
      stroke-dasharray: 760;
      stroke-dashoffset: 760;
      animation: draw 3.2s ease forwards, glow 3.2s ease-in-out infinite alternate;
    }
    .tagline {
      font: 500 18px Arial, sans-serif;
      letter-spacing: 8px;
      fill: #d0c5af;
      opacity: 0;
      animation: rise 1.4s ease 1.6s forwards;
    }
    .rule {
      stroke: #f2ca50;
      stroke-width: 2;
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      animation: draw 2s ease 1s forwards;
    }
    .shine {
      fill: rgba(255,255,255,0.85);
      filter: blur(8px);
      transform: skewX(-18deg);
      animation: sweep 3.4s ease-in-out infinite;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes sweep {
      0%, 15% { transform: translateX(-180px) skewX(-18deg); opacity: 0; }
      40% { opacity: 0.45; }
      70%, 100% { transform: translateX(1060px) skewX(-18deg); opacity: 0; }
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 0 rgba(242,202,80,0)); }
      to { filter: drop-shadow(0 0 14px rgba(242,202,80,0.28)); }
    }
  </style>
  <defs>
    <linearGradient id="gold" x1="174" y1="53" x2="782" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eae1d4"/>
      <stop offset="0.3" stop-color="#f2ca50"/>
      <stop offset="0.62" stop-color="#fff2b8"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <rect class="bg" width="960" height="180" rx="0"/>
  <rect class="shine" x="-120" y="20" width="72" height="140"/>
  <text class="word" x="480" y="96" text-anchor="middle">LUMINA</text>
  <line class="rule" x1="350" y1="122" x2="610" y2="122"/>
  <text class="tagline" x="480" y="154" text-anchor="middle">ARCHITECTING LEGACIES</text>
</svg>
